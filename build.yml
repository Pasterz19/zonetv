name: Auto Pack Extension

# Uruchom ten skrypt przy każdym pushu do gałęzi main
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Pobranie kodu z repozytorium
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Instalacja narzędzia do pakowania (opcjonalne, używamy wbudowanego zip)
      # W przypadku prostych rozszerzeń bez budowania (npm build) wystarczy standardowe zip.

      # 3. Utworzenie pliku ZIP z rozszerzeniem
      # Wykluczamy pliki niepotrzebne w wersji produkcyjnej (np. .git, workflow, readme)
      - name: Create ZIP artifact
        run: |
          zip -r zonetv-extension.zip . \
          -x ".git/*" \
          -x ".github/*" \
          -x "*.md" \
          -x ".gitignore" \
          -x "*.zip"

      # 4. Upload spakowanego pliku jako "artifact" (można go pobrać z poziomu Actions w GitHub)
      - name: Upload ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: zonetv-extension-package
          path: zonetv-extension.zip
